name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run repository checks
        run: |
          chmod +x scripts/check_repo.sh scripts/install.sh scripts/verify_deployment.py scripts/smoke_install.sh scripts/runtime_smoke.sh scripts/mock_gateway.py
          ./scripts/check_repo.sh

      - name: Run unattended install smoke test
        run: |
          ./scripts/smoke_install.sh

      - name: Run bridge runtime smoke test
        run: |
          ./scripts/runtime_smoke.sh

      - name: Build Docker image
        run: |
          docker build -t openclaw-telegram-miniapp:ci .
